# Fly.io deploy for the Parambhariya API.
#   fly launch --no-deploy        (first time, creates the app)
#   fly volumes create api_data --size 1
#   fly deploy
app = "parambhariya-api"
primary_region = "maa"   # Chennai — closest to Coimbatore

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8787"
  DATABASE_PATH = "/data/parambhariya.db"
  LOOP_INTERVAL_MS = "3000"

[[mounts]]
  source = "api_data"
  destination = "/data"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "15s"
    timeout = "2s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
