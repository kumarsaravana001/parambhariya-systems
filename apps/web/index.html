<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#4baf3b" />
    <title>Parambhariya</title>
    <!-- Set the color scheme before the bundle paints to avoid a white flash
         (FOUC). Resolves the persisted choice; "system"/unset follows the OS. -->
    <script>
      (function () {
        try {
          var c = localStorage.getItem("parambhariya.colorscheme") || "system";
          var dark = c === "dark" || (c === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.dataset.theme = dark ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
